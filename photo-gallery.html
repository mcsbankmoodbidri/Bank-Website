<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - MCS BANK</title>
    <style>
        /* Base Reset & Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; min-height: 100vh; }

        /* ----------------------------------
           BREADCRUMB / PAGE TITLE BAR
        ----------------------------------- */
        .breadcrumb-container {
            width: 100%;
            max-width: 1400px;
            margin: 30px auto 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .breadcrumb-home {
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .breadcrumb-home:hover {
            color: #3498db;
        }

        .breadcrumb-separator {
            color: #bdc3c7;
            font-size: 12px;
        }

        .breadcrumb-current {
            color: #2c3e50;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ----------------------------------
           GALLERY GRID
        ----------------------------------- */
        .gallery-container {
            width: 100%;
            max-width: 1400px;
            margin: 15px auto 40px auto; 
            padding: 0 20px;
            flex-grow: 1;
        }

        .gallery-title {
            text-align: center;
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 5 Columns layout */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .grid-img {
            width: 100%;
            aspect-ratio: 4 / 3; 
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-color: #eaeaea; /* Light gray placeholder while loading */
        }

        .grid-img:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 1;
        }

        /* ----------------------------------
           FULLSCREEN LIGHTBOX MODAL
        ----------------------------------- */
        .lightbox-modal {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92); 
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .lightbox-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .lightbox-content {
            position: relative;
            max-width: 85%;
            max-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border: 2px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.2s;
            z-index: 2001;
        }

        .close-btn:hover {
            color: #e74c3c;
        }

        /* Navigation Arrows */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            font-size: 30px;
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 4px;
        }

        .nav-arrow:hover {
            background: rgba(0,0,0,0.9);
        }

        .prev-arrow { left: -70px; }
        .next-arrow { right: -70px; }

        /* Responsive */
        @media (max-width: 1000px) { .photo-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 800px) { 
            .photo-grid { grid-template-columns: repeat(3, 1fr); } 
            .prev-arrow { left: 0; } 
            .next-arrow { right: 0; }
        }
        @media (max-width: 500px) { .photo-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div class="breadcrumb-container">
        <a href="index.html" class="breadcrumb-home">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Home
        </a>
        <span class="breadcrumb-separator">❯</span>
        <span class="breadcrumb-current">Gallery</span>
    </div>

    <main class="gallery-container">
        <h2 class="gallery-title">Gallery</h2>
        
        <div class="photo-grid" id="photoGrid">
        </div>
    </main>

    <div class="lightbox-modal" id="lightbox">
        <button class="close-btn" onclick="closeLightbox()">&times;</button>
        
        <div class="lightbox-content">
            <button class="nav-arrow prev-arrow" onclick="changeImage(-1)">&#10094;</button>
            <img src="" alt="Fullscreen Image" class="lightbox-img" id="lightboxImg">
            <button class="nav-arrow next-arrow" onclick="changeImage(1)">&#10095;</button>
        </div>
    </div>

    <script src="header.js"></script>
    <script src="footer.js"></script>

    <script>
        // Generate the 149 image paths programmatically
        const images = [];
        for (let i = 1; i <= 149; i++) {
            images.push(`images/inauguration/${i}.jpg`);
        }

        const gridContainer = document.getElementById('photoGrid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        let currentImgIndex = 0;

        // Generate the grid of thumbnails
        images.forEach((url, index) => {
            const imgElement = document.createElement('img');
            imgElement.src = url;
            imgElement.className = 'grid-img';
            // Lazy load images for better performance with 149 images
            imgElement.loading = "lazy"; 
            imgElement.alt = `Inauguration Image ${index + 1}`;
            
            imgElement.onclick = () => openLightbox(index);
            gridContainer.appendChild(imgElement);
        });

        // Function to Open Lightbox
        function openLightbox(index) {
            currentImgIndex = index;
            lightboxImg.src = images[currentImgIndex];
            lightbox.classList.add('active');
        }

        // Function to Close Lightbox
        function closeLightbox() {
            lightbox.classList.remove('active');
        }

        // Function to change image with arrows
        function changeImage(directionStep) {
            currentImgIndex += directionStep;

            if (currentImgIndex >= images.length) {
                currentImgIndex = 0;
            } 
            else if (currentImgIndex < 0) {
                currentImgIndex = images.length - 1;
            }

            lightboxImg.src = images[currentImgIndex];
        }

        // Close modal if background is clicked
        lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox || e.target === document.querySelector('.lightbox-content')) {
                closeLightbox();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') changeImage(1);
            if (e.key === 'ArrowLeft') changeImage(-1);
        });
    </script>
</body>
</html>
