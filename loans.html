<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loans - MCS BANK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ----------------------------------
           BREADCRUMB / PAGE TITLE BAR
        ----------------------------------- */
        .breadcrumb-container {
            width: 100%;
            max-width: 1200px;
            margin: 30px auto 0 auto;
            padding: 0 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .breadcrumb-home {
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .breadcrumb-home:hover {
            color: #3498db;
        }

        .breadcrumb-separator {
            color: #bdc3c7;
            font-size: 12px;
        }

        .breadcrumb-current {
            color: #2c3e50;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ----------------------------------
           MAIN LAYOUT
        ----------------------------------- */
        .layout-wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 15px auto 40px auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: flex;
            flex-grow: 1;
            max-height: 800px;
        }

        .sidebar {
            width: 320px;
            background-color: #fcfcfc;
            border-right: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 4px; }

        .sidebar-title {
            padding: 30px 20px 15px 20px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8c8d;
            font-weight: 600;
            position: sticky;
            top: 0;
            background-color: #fcfcfc;
            z-index: 10;
        }

        .tab-button {
            background: none;
            border: none;
            text-align: left;
            padding: 16px 20px;
            font-size: 14px;
            color: #2c3e50;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.2s ease;
            font-weight: 500;
            line-height: 1.4;
        }

        .tab-button:hover { background-color: #f0f4f8; }

        .tab-button.active {
            background-color: #eaf2f8;
            border-left: 4px solid #3498db;
            color: #3498db;
            font-weight: 600;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background-color: #ffffff;
        }

        .fade-in { animation: fadeIn 0.4s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .text-content { padding: 40px; }

        .text-content h2 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 24px;
            line-height: 1.2;
        }

        /* ── PDF-replica styles ── */
        .part-heading {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0 0 12px 0;
            padding-bottom: 4px;
            border-bottom: 2px solid #1a1a1a;
        }

        .section-label {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 20px 0 8px 0;
        }

        .doc-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13.5px;
            margin-bottom: 6px;
        }

        .doc-table th {
            background-color: #2c3e50;
            color: #fff;
            padding: 9px 14px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #2c3e50;
        }

        .doc-table td {
            padding: 8px 14px;
            border: 1px solid #c8c8c8;
            color: #222;
            vertical-align: top;
        }

        .doc-table tbody tr:nth-child(even) td { background-color: #f5f5f5; }
        .doc-table tbody tr:hover td { background-color: #eaf2f8; }

        .loans-table td:first-child { width: 42px; text-align: center; font-weight: 600; color: #2c3e50; }
        .loans-table td:last-child { width: 160px; font-weight: 600; color: #1a5276; white-space: nowrap; }

        .loans-table tr.group-header td {
            background-color: #d6eaf8 !important;
            font-weight: 700;
            color: #154360;
            padding-top: 10px;
            padding-bottom: 4px;
        }

        .loans-table tr.sub-row td:nth-child(2) { padding-left: 28px; color: #444; }

        .doc-note { font-size: 12.5px; color: #666; margin-top: 6px; margin-bottom: 16px; font-style: italic; }

        .provisions-list { list-style: none; padding: 0; margin: 0; }
        .provisions-list li {
            font-size: 13.5px;
            color: #222;
            padding: 9px 14px 9px 36px;
            border: 1px solid #c8c8c8;
            border-top: none;
            position: relative;
            line-height: 1.6;
        }
        .provisions-list li:first-child { border-top: 1px solid #c8c8c8; }
        .provisions-list li:nth-child(even) { background-color: #f5f5f5; }
        .provisions-list li::before {
            content: attr(data-num) ".";
            position: absolute;
            left: 14px;
            font-weight: 700;
            color: #2c3e50;
        }

        .inline-highlight { font-weight: 700; color: #c0392b; }
        
        .info-paragraph {
            color: #555;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        @media (max-width: 850px) {
            .layout-wrapper { flex-direction: column; margin: 15px 20px 40px 20px; width: auto; max-height: none; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #eaeaea; flex-direction: row; overflow-x: auto; white-space: nowrap; max-height: none; }
            .sidebar-title { display: none; }
            .tab-button { border-left: none; border-bottom: 4px solid transparent; padding: 15px 20px; }
            .tab-button.active { border-left: none; border-bottom: 4px solid #3498db; }
            .text-content { padding: 25px; }
            .text-content h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="breadcrumb-container">
        <a href="index.html" class="breadcrumb-home">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Home
        </a>
        <span class="breadcrumb-separator">❯</span>
        <span class="breadcrumb-current">Loans</span>
    </div>

    <div class="layout-wrapper">
        <aside class="sidebar">
            <div class="sidebar-title">Loan Schemes</div>
            <button class="tab-button active" onclick="loadLoanData('rate', this)">Rate of interest on loans</button>
            <button class="tab-button" onclick="loadLoanData('types', this)">Types of Loans</button>
        </aside>

        <main class="main-content">
            <article class="text-content fade-in" id="display-text">
                <h2 id="display-title"></h2>
                <div id="display-paragraphs"></div>
            </article>
        </main>
    </div>

    <script src="header.js"></script>
    <script src="footer.js"></script>

            types: {

                paragraphs: `
                    <div class="part-heading">Loan Schemes & Tenures</div>

        };

        function loadLoanData(loanType, clickedElement) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            clickedElement.classList.add('active');

            const data = loanDatabase[loanType];
            const titleEl = document.getElementById('display-title');
            const parasEl = document.getElementById('display-paragraphs');
            const textContainer = document.getElementById('display-text');

            textContainer.classList.remove('fade-in');

            setTimeout(() => {
                titleEl.textContent = data.title;
                parasEl.innerHTML = data.paragraphs;
                textContainer.classList.add('fade-in');
            }, 10);
        }

        loadLoanData('rate', document.querySelector('.tab-button'));
    </script>

</body>
</html>
