<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposits - MCS BANK</title>
    <style>
        /* Base Reset & Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ----------------------------------
           BREADCRUMB / PAGE TITLE BAR
        ----------------------------------- */
        .breadcrumb-container {
            width: 100%;
            max-width: 1100px;
            margin: 30px auto 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .breadcrumb-home {
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .breadcrumb-home:hover {
            color: #3498db;
        }

        .breadcrumb-separator {
            color: #bdc3c7;
            font-size: 12px;
        }

        .breadcrumb-current {
            color: #2c3e50;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ----------------------------------
           MAIN LAYOUT
        ----------------------------------- */
        .layout-wrapper {
            width: 100%;
            max-width: 1100px;
            margin: 15px auto 40px auto; 
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: flex; 
            flex-grow: 1;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 300px; 
            background-color: #fcfcfc;
            border-right: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-title {
            padding: 30px 20px 15px 20px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8c8d;
            font-weight: 600;
        }

        .tab-button {
            background: none;
            border: none;
            text-align: left;
            padding: 16px 20px;
            font-size: 15px;
            color: #2c3e50;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .tab-button:hover {
            background-color: #f0f4f8;
        }

        .tab-button.active {
            background-color: #eaf2f8;
            border-left: 4px solid #3498db;
            color: #3498db;
            font-weight: 600;
        }

        /* Dynamic Content Area */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        /* Smooth fade animation for when content changes */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .text-content {
            padding: 40px;
        }

        .text-content h2 {
            color: #2c3e50;
            font-size: 32px;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        /* Bullet List Styling */
        .deposit-types-list {
            list-style-type: disc;
            padding-left: 20px;
            margin-top: 10px;
        }

        .deposit-types-list li {
            font-size: 16px;
            color: #555;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        /* ── Table/Doc styles ── */
        .section-label { font-size: 14px; font-weight: 600; color: #1a1a1a; margin: 20px 0 8px 0; }
        .doc-table { width: 100%; border-collapse: collapse; font-size: 13.5px; margin-bottom: 6px; }
        .doc-table th { background-color: #2c3e50; color: #fff; padding: 9px 14px; text-align: left; font-weight: 600; border: 1px solid #2c3e50; }
        .doc-table td { padding: 8px 14px; border: 1px solid #c8c8c8; color: #222; vertical-align: top; }
        .doc-table tbody tr:nth-child(even) td { background-color: #f5f5f5; }
        .doc-table tbody tr:hover td { background-color: #eaf2f8; }
        .doc-note { font-size: 12.5px; color: #666; margin-top: 6px; margin-bottom: 16px; font-style: italic; }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            .breadcrumb-container {
                padding: 0 20px;
                margin-top: 25px;
            }
            .layout-wrapper {
                flex-direction: column; 
                margin: 15px 20px 40px 20px;
                width: auto;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #eaeaea;
                flex-direction: row; 
                overflow-x: auto;
                white-space: nowrap;
            }
            .sidebar-title { display: none; }
            .tab-button {
                border-left: none;
                border-bottom: 4px solid transparent;
                padding: 15px 20px;
            }
            .tab-button.active {
                border-left: none;
                border-bottom: 4px solid #3498db;
            }
            .text-content { padding: 25px; }
            .text-content h2 { font-size: 26px; }
        }
    </style>
</head>
<body>

    <div class="breadcrumb-container">
        <a href="index.html" class="breadcrumb-home">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Home
        </a>
        <span class="breadcrumb-separator">❯</span>
        <span class="breadcrumb-current">Deposits</span>
    </div>

    <div class="layout-wrapper">
        <aside class="sidebar">
            <div class="sidebar-title">Deposit Schemes</div>
            
            <button class="tab-button active" onclick="loadDepositData('rate', this)">Rate of Interest</button>
            <button class="tab-button" onclick="loadDepositData('types', this)">Types of Deposits</button>
        </aside>

        <main class="main-content">
            <article class="text-content fade-in" id="display-text">
                <h2 id="display-title">Current Rates of Interest</h2>
                <div id="display-paragraphs"></div>
            </article>
        </main>
    </div>
    
    <script src="header.js"></script>
    <script src="footer.js"></script>

    <script>
        const depositDatabase = {
            rate: {
                title: "Interest Rate on Deposits",
                paragraphs: `
                    <div class="section-label" style="margin-top:0;">1. Savings Account Interest Rate: <span style="color:#1a5276;">3.00%</span></div>
                    <div class="section-label">2. Monthly Deposit Interest Rate: <span style="color:#1a5276;">8.00%</span></div>
                    <div class="section-label">3. Revised Interest Rate for Fixed Deposits <span style="font-weight:400;font-size:13px;">(Applicable from 01-09-2020)</span></div>
                    <table class="doc-table">
                        <thead>
                            <tr><th>Duration</th><th>Interest Rate</th></tr>
                        </thead>
                        <tbody>
                            <tr><td>15 days to 45 days</td><td>4.00%</td></tr>
                            <tr><td>46 days to 90 days</td><td>5.00%</td></tr>
                            <tr><td>91 days to 180 days</td><td>6.00%</td></tr>
                            <tr><td>181 days to below 1 year</td><td>7.00%</td></tr>
                            <tr><td>1 year up to 3 years</td><td>8.50%</td></tr>
                            <tr><td>Above 3 years</td><td>9.00%</td></tr>
                        </tbody>
                    </table>
                    <p class="doc-note">Note: For Senior Citizens, an additional 0.5% extra interest facility is available.</p>

                    <div class="section-label">4. Akshaya Cash Certificate <span style="font-weight:400;font-size:13px;">(Maturity Value for Rs. 1000)</span></div>
                    <table class="doc-table">
                        <thead>
                            <tr><th>Duration</th><th>Maturity Value (Rs.)</th></tr>
                        </thead>
                        <tbody>
                            <tr><td>1 Year</td><td>1,080</td></tr>
                            <tr><td>2 Years</td><td>1,166</td></tr>
                            <tr><td>3 Years</td><td>1,259</td></tr>
                            <tr><td>4 Years</td><td>1,360</td></tr>
                            <tr><td>5 Years</td><td>1,469</td></tr>
                        </tbody>
                    </table>
                `
            },
            types: {
                title: "Types of Deposits",
                paragraphs: `
                    <ul class="deposit-types-list">
                        <li>Akshaya Cash Certificate (ACC)</li>
                        <li>Fixed Deposits</li>
                        <li>Current Account</li>
                        <li>Recurring Deposits</li>
                        <li>Pigmy Deposits</li>
                        <li>Savings Bank</li>
                        <li>Safe Locker Deposits</li>
                        <li>Farmer's Pensions Deposits</li>
                        <li>Staff Deposits</li>
                    </ul>
                `
            }
        };

        function loadDepositData(depositType, clickedElement) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            clickedElement.classList.add('active');

            const data = depositDatabase[depositType];
            const titleEl = document.getElementById('display-title');
            const parasEl = document.getElementById('display-paragraphs');
            const textContainer = document.getElementById('display-text');

            textContainer.classList.remove('fade-in');

            setTimeout(() => {
                titleEl.textContent = data.title;
                parasEl.innerHTML = data.paragraphs;
                textContainer.classList.add('fade-in');
            }, 10); 
        }

        // Initialize the first tab
        loadDepositData('rate', document.querySelector('.tab-button'));
    </script>
</body>
</html>
